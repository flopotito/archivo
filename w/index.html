<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Florencia Umaña</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>
body {
font-family: 'Libre Baskerville', serif;
margin: 0;
min-height: 100vh;
background-color: black;
background-image: url("fondo3.jpg");
background-size: cover;
background-repeat: no-repeat;
background-position: center;
}

/* capa oscura */
body::before {
content: "";
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.2);
z-index: -1;
}

.contenedor {
position: relative;
width: 100%;
height: 100vh;
}

/* NOMBRE ARRIBA IZQUIERDA (más sutil) */
.header {
position: absolute;
top: 50px;
left: 60px;
}

h1 {
font-size: 28px;
margin: 0;
color: white;
font-weight: normal;
letter-spacing: 1px;
}

/* quitamos protagonismo al subtítulo */
p {
font-size: 14px;
margin-top: 6px;
color: rgba(255,255,255,0.6);
}

/* MENÚ ARRIBA DERECHA (más fino) */
.menu {
position: absolute;
top: 50px;
right: 60px;
display: flex;
gap: 25px;
}

.seccion a {
text-decoration: none;
color: white;
font-size: 16px;
opacity: 0.8;
transition: opacity 0.3s;
}

.seccion a:hover {
opacity: 0.4;
}
</style>
</head>

<body>

<div class="contenedor">

<div class="header">
<h1>Florencia Umaña</h1>
</div>

<div class="menu">
<div class="seccion">
<a href="obras.html">Obras</a>
</div>

<div class="seccion">
<a href="contacto.html">Contacto</a>
</div>
</div>

</div>

</body>
</html>
