<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Contacto - Florencia Umaña</title>

<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Libre Baskerville', serif;
background:black;
}

/* capa oscura suave (opcional si agregas fondo después) */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
z-index:-1;
}

/* CONTENEDOR GENERAL */
.contenedor{
position:relative;
width:100%;
min-height:100vh;
}

/* HEADER IZQUIERDA */
.header{
position:absolute;
top:50px;
left:60px;
}

.header h1{
font-size:28px;
margin:0;
color:white;
font-weight:normal;
letter-spacing:1px;
}

/* MENÚ DERECHA */
.menu{
position:absolute;
top:50px;
right:60px;
display:flex;
gap:25px;
}

.seccion a{
text-decoration:none;
color:white;
font-size:16px;
opacity:0.8;
transition:opacity 0.3s;
}

.seccion a:hover{
opacity:0.4;
}

/* CONTENIDO */
.contenido{
display:flex;
margin-top:140px;
height:calc(100vh - 140px);
}

/* TEXTO CONTACTO */
.contacto{
width:40%;
padding:60px;
color:white;
}

.contacto h2{
font-size:22px;
font-weight:normal;
margin-bottom:30px;
}

.contacto p{
font-size:16px;
margin:15px 0;
opacity:0.8;
}

/* IMAGEN */
.imagen{
width:60%;
}

.imagen img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="contenedor">

<!-- HEADER -->
<div class="header">
<h1>Florencia Umaña</h1>
</div>

<!-- MENÚ -->
<div class="menu">
<div class="seccion">
<a href="obras.html">Obras</a>
</div>
<div class="seccion">
<a href="contacto.html">Contacto</a>
</div>
</div>

<!-- CONTENIDO -->
<div class="contenido">

<div class="contacto">
<h2>Contacto</h2>
<p>Email: flobelen@gmail.com</p>
<p>Instagram: @florquesiente</p>
</div>

<div class="imagen">
<img src="imgcontacto.jpg">
</div>

</div>

</div>

</body>
</html>
